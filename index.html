<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MiniLista</title>
<style>
  :root { color-scheme: light dark; --bg:#fff; --fg:#1c1c1e; --muted:#6b6b70; --accent:#8DA290; --link:#3a7d5d; }
  @media (prefers-color-scheme: dark) { :root { --bg:#1c1c1e; --fg:#ececf0; --muted:#9a9aa0; --accent:#A3B18A; --link:#a9c9b4; } }
  body { margin:0; min-height:100vh; display:flex; align-items:center; justify-content:center; background:var(--bg); color:var(--fg);
         font:17px/1.6 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; text-align:center; padding:2rem; }
  main { max-width:32rem; }
  h1 { font-size:2.5rem; margin:0 0 .5rem; }
  p { color:var(--muted); margin:.4rem 0 1.5rem; }
  a { color:var(--link); }
  .dot { color:var(--accent); }
</style>
</head>
<body>
<main>
  <h1>MiniLista<span class="dot">.</span></h1>
  <p>Simple lists, not tasks. A focused list app for iPhone &amp; iPad.</p>
  <p><a href="privacy/">Privacy Policy</a></p>
</main>
</body>
</html>
